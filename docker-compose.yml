services:
  # --- INFRASTRUCTURE ---
  db-global:
    build:
      context: ./db_postgres
      dockerfile: Dockerfile
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
      POSTGRES_DB: asdf_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - asdf-network

  db-operacion:
    build:
      context: ./db_operacion
      dockerfile: Dockerfile
    container_name: db_operacion
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
      POSTGRES_DB: operacion_db
    ports:
      - "5433:5432"
    volumes:
      - pgdata_operacion:/var/lib/postgresql/data
    networks:
      - asdf-network

  db-facturacion:
    build:
      context: ./db_facturacion
      dockerfile: Dockerfile
    container_name: db_facturacion
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
      POSTGRES_DB: facturacion_db
    ports:
      - "5434:5432"
    volumes:
      - pgdata_facturacion:/var/lib/postgresql/data
    networks:
      - asdf-network

  gateway:
    image: nginx:latest
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "8080:80"
    depends_on:
      - front-login
      - front-administracion
      - ms-middleware
    networks:
      - asdf-network

  # --- MIDDLEWARE & AUTH ---
  ms-middleware:
    build:
      context: ../hub-backends/modulo_middleware
      dockerfile: Dockerfile
    container_name: ms_middleware
    environment:
      - JWT_SECRET=super-secret-key-123
    networks:
      - asdf-network

  # --- MICROSERVICES ---
  ms-administracion:
    build:
      context: ../hub-backends/modulo_administracion
      dockerfile: Dockerfile
    container_name: ms_administracion
    environment:
      - DATABASE_URL=postgresql+asyncpg://admin:admin123@db-global:5432/asdf_db
      - JWT_SECRET=super-secret-key-123
    networks:
      - asdf-network

  ms-rrhh:
    build:
      context: ../hub-backends/modulo_rrhh
      dockerfile: Dockerfile
    container_name: ms_rrhh
    environment:
      - DATABASE_URL=postgresql+asyncpg://admin:admin123@db-global:5432/asdf_db
      - JWT_SECRET=super-secret-key-123
    networks:
      - asdf-network

  ms-mantencion:
    build:
      context: ../hub-backends/modulo_mantencion
      dockerfile: Dockerfile
    container_name: ms_mantencion
    environment:
      - DATABASE_URL=postgresql+asyncpg://admin:admin123@db-global:5432/asdf_db
      - JWT_SECRET=super-secret-key-123
    networks:
      - asdf-network

  ms-bodega:
    build:
      context: ../hub-backends/modulo_bodega
      dockerfile: Dockerfile
    container_name: ms_bodega
    environment:
      - DATABASE_URL=postgresql+asyncpg://admin:admin123@db-global:5432/asdf_db
      - JWT_SECRET=super-secret-key-123
    networks:
      - asdf-network

  ms-facturacion:
    build:
      context: ../hub-ms-facturacion
      dockerfile: Dockerfile
    container_name: ms_facturacion
    environment:
      - DATABASE_URL=postgresql+asyncpg://admin:admin123@db-facturacion:5432/facturacion_db
      - JWT_SECRET=super-secret-key-123
    depends_on:
      - db-facturacion
    networks:
      - asdf-network

  ms-operacion:
    build:
      context: ../hub-ms-operacion
      dockerfile: Dockerfile
    container_name: ms_operacion
    environment:
      - DATABASE_URL=postgresql+asyncpg://admin:admin123@db-operacion:5432/operacion_db
      - JWT_SECRET=super-secret-key-123
    depends_on:
      - db-operacion
    networks:
      - asdf-network

  ms-prevencion:
    build:
      context: ../hub-backends/modulo_prevencion
      dockerfile: Dockerfile
    container_name: ms_prevencion
    environment:
      - DATABASE_URL=postgresql+asyncpg://admin:admin123@db-global:5432/asdf_db
      - JWT_SECRET=super-secret-key-123
    networks:
      - asdf-network

  ms-acreditacion:
    build:
      context: ../hub-backends/modulo_acreditacion
      dockerfile: Dockerfile
    container_name: ms_acreditacion
    environment:
      - DATABASE_URL=postgresql+asyncpg://admin:admin123@db-global:5432/asdf_db
      - JWT_SECRET=super-secret-key-123
    networks:
      - asdf-network

  ms-watchdog:
    build:
      context: ../hub-backends/modulo_watchdog
      dockerfile: Dockerfile
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - JWT_SECRET=super-secret-key-123
    networks:
      - asdf-network

  # --- FRONTENDS ---
  front-login:
    build:
      context: ../hub-frontends
      dockerfile: ./front_modulo_login/Dockerfile
    environment:
      - VITE_API_URL=/api/v1
    networks:
      - asdf-network

  front-administracion:
    build:
      context: ../hub-frontends
      dockerfile: ./front_modulo_administracion/Dockerfile
    environment:
      - VITE_API_URL=/api/v1
    networks:
      - asdf-network

  front-rrhh:
    build:
      context: ../hub-frontends
      dockerfile: ./front_modulo_rrhh/Dockerfile
    environment:
      - VITE_API_URL=/api/v1
    networks:
      - asdf-network

  front-mantencion:
    build:
      context: ../hub-frontends
      dockerfile: ./front_modulo_mantencion/Dockerfile
    environment:
      - VITE_API_URL=/api/v1
    networks:
      - asdf-network

  front-bodega:
    build:
      context: ../hub-frontends
      dockerfile: ./front_modulo_bodega/Dockerfile
    environment:
      - VITE_API_URL=/api/v1
    networks:
      - asdf-network

  front-facturacion:
    build:
      context: ../hub-frontends
      dockerfile: ./front_modulo_facturacion/Dockerfile
    environment:
      - VITE_API_URL=/api/v1
    networks:
      - asdf-network

  front-operacion:
    build:
      context: ../hub-frontends
      dockerfile: ./front_modulo_operacion/Dockerfile
    environment:
      - VITE_API_URL=/api/v1
    networks:
      - asdf-network

  front-prevencion:
    build:
      context: ../hub-frontends
      dockerfile: ./front_modulo_prevencion/Dockerfile
    environment:
      - VITE_API_URL=/api/v1
    networks:
      - asdf-network

  front-acreditacion:
    build:
      context: ../hub-frontends
      dockerfile: ./front_modulo_acreditacion/Dockerfile
    environment:
      - VITE_API_URL=/api/v1
    networks:
      - asdf-network

  front-watchdog:
    build:
      context: ../hub-frontends
      dockerfile: ./front_modulo_watchdog/Dockerfile
    environment:
      - VITE_API_URL=/api/v1
    networks:
      - asdf-network

networks:
  asdf-network:
    driver: bridge

volumes:
  pgdata:
  pgdata_operacion:
  pgdata_facturacion:
