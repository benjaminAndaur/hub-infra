worker_processes 1;

events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;
    sendfile        on;
    keepalive_timeout  65;

    # Mapa para WebSockets
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    resolver 127.0.0.11 valid=30s;

    server {
        listen       80;
        server_name  localhost;

        # --- AUTH CHECK INTERNAL ---
        location = /_auth_check {
            internal;
            proxy_pass http://ms-middleware:8009/validate;
            proxy_pass_request_body off;
            proxy_set_header Content-Length "";
            proxy_set_header X-Original-URI $request_uri;
            proxy_set_header Authorization $http_authorization;
        }

        # --- MODULO LOGIN ---
        location /login/ {
            set $target front-login;
            proxy_pass http://$target:3008;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host $http_host;
        }

        # Root: Redirige a Administracion
        location / {
            set $target front-administracion;
            proxy_pass http://$target:3007;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host $http_host;
        }

        # --- FRONTENDS ---
        location /rrhh/ { 
            set $t front-rrhh; 
            proxy_pass http://$t:3000; 
            proxy_http_version 1.1; 
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host $http_host; 
        }
        location /bodega/ { 
            set $t front-bodega; 
            proxy_pass http://$t:3005; 
            proxy_http_version 1.1; 
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host $http_host; 
        }
        location /mantencion/ { 
            set $t front-mantencion; 
            proxy_pass http://$t:3000; 
            proxy_http_version 1.1; 
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host $http_host; 
        }
        location /facturacion/ { 
            set $t front-facturacion; 
            proxy_pass http://$t:3006; 
            proxy_http_version 1.1; 
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host $http_host; 
        }
        location /operacion/ { 
            set $t front-operacion; 
            proxy_pass http://$t:3000; 
            proxy_http_version 1.1; 
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host $http_host; 
        }
        location /prevencion/ { 
            set $t front-prevencion; 
            proxy_pass http://$t:3002; 
            proxy_http_version 1.1; 
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host $http_host; 
        }
        location /acreditacion/ { 
            set $t front-acreditacion; 
            proxy_pass http://$t:3000; 
            proxy_http_version 1.1; 
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host $http_host; 
        }
        location /watchdog/ { 
            set $t front-watchdog; 
            proxy_pass http://$t:3002; 
            proxy_http_version 1.1; 
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host $http_host; 
        }

        # --- API V1 ---
        # Public login
        location /api/v1/administracion/login {
            auth_request off;
            set $s ms-administracion;
            proxy_pass http://$s:8007;
            proxy_set_header Host $http_host;
        }

        # Health checks (Public)
        location ~* /health$ {
            auth_request off;
            set $s ms-middleware;
            proxy_pass http://$s:8009/health;
            proxy_set_header Host $http_host;
        }

        # Helper for auth inheritance
        location /api/v1/ {
            if ($request_method = 'OPTIONS') {
                add_header 'Access-Control-Allow-Origin' 'http://localhost:8080' always;
                add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS, PUT, DELETE' always;
                add_header 'Access-Control-Allow-Headers' 'Authorization, Content-Type' always;
                add_header 'Access-Control-Max-Age' 1728000;
                add_header 'Content-Type' 'text/plain; charset=utf-8';
                add_header 'Content-Length' 0;
                return 204;
            }
            
            auth_request /_auth_check;
            auth_request_set $user_id $upstream_http_x_user_id;
            auth_request_set $user_role $upstream_http_x_user_role;
            proxy_set_header X-User-ID $user_id;
            proxy_set_header X-User-Role $user_role;
            proxy_set_header Host $http_host;

            # Direct microservices (using trailing slashes where needed)
            location /api/v1/personal/ {
                set $s ms-rrhh;
                proxy_pass http://$s:8000$request_uri;
            }
            location /api/v1/vehiculos/ {
                set $s ms-mantencion;
                proxy_pass http://$s:8000$request_uri;
            }
            location /api/v1/mantenciones/ {
                set $s ms-mantencion;
                proxy_pass http://$s:8000$request_uri;
            }
            location /api/v1/preventive/ {
                set $s ms-mantencion;
                proxy_pass http://$s:8000$request_uri;
            }
            location /api/v1/bodega/ {
                set $s ms-bodega;
                proxy_pass http://$s:8000$request_uri;
            }
            location /api/v1/facturacion/ {
                set $s ms-facturacion;
                proxy_pass http://$s:8000$request_uri;
            }
            location /api/v1/operacion/ {
                set $s ms-operacion;
                proxy_pass http://$s:8000$request_uri;
            }
            location /api/v1/acreditacion/ {
                set $s ms-acreditacion;
                proxy_pass http://$s:8000$request_uri;
            }
            location /api/v1/administracion/ {
                set $s ms-administracion;
                proxy_pass http://$s:8007$request_uri;
            }
            location /api/v1/watchdog/ {
                set $s ms-watchdog;
                proxy_pass http://$s:8008/;
            }
            
            # Fallback for ms-middleware
            proxy_pass http://ms-middleware:8009/api/v1/;
        }
    }
}
